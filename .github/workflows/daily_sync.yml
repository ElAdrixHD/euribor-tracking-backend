name: Daily Euribor Sync

on:
  schedule:
    # 9:00 UTC Mon–Fri (BDE publishes at ~08:15 UTC)
    - cron: "0 9 * * 1-5"
  workflow_dispatch:
    inputs:
      backfill:
        description: "Run full historical backfill"
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e .
        working-directory: backend

      - name: Run sync
        working-directory: backend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          RUN_BACKFILL: ${{ github.event.inputs.backfill }}
        run: |
          if [ "$RUN_BACKFILL" = "true" ]; then
            python src/sync.py --backfill
          else
            python src/sync.py
          fi
